<template>
    <lightning-card title="Invoice Payment Portal" icon-name="standard:invoice">

        <!-- Search Section (hidden if auto-loaded from URL) -->
        <template if:false={autoLoadedFromUrl}>
            <div class="slds-p-around_medium search-section">
                <div class="slds-grid slds-wrap slds-gutters slds-grid_align-center">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_8-of-12">
                        <lightning-input
                            type="text"
                            label="Enter Invoice Number"
                            placeholder="e.g., INV-0001"
                            value={invoiceNumber}
                            onchange={handleInvoiceNumberChange}
                            onkeypress={handleKeyPress}
                        ></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-top_large slds-grid slds-gutters">
                        <lightning-button
                            label="Search"
                            onclick={handleSearch}
                            variant="brand"
                            class="slds-m-right_small"
                        ></lightning-button>
                        <lightning-button
                            label="Clear"
                            onclick={handleClear}
                            variant="neutral"
                        ></lightning-button>
                    </div>
                </div>
            </div>
        </template>

        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <div class="slds-is-relative" style="height: 100px;">
                <lightning-spinner alternative-text="Loading invoice..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Error Message -->
        <template if:true={errorMessage}>
            <div class="slds-p-around_medium">
                <div class="error-alert" role="alert">
                    <p>{errorMessage}</p>
                </div>
            </div>
        </template>

        <!-- Invoice Details -->
        <template if:true={invoiceRecord}>
            <div class="slds-p-around_medium">

                <!-- Account Info Section -->
                <div class="info-section slds-m-bottom_medium">
                    <div class="section-header">
                        <span class="section-icon">🏦</span>
                        <span class="section-title">Account Info</span>
                    </div>
                    <div class="info-card">
                        <div class="info-grid">
                            <div class="info-field">
                                <span class="field-label">Invoice Number</span>
                                <span class="field-value highlight-orange">{invoiceRecord.Name}</span>
                            </div>
                            <div class="info-field">
                                <span class="field-label">Date</span>
                                <span class="field-value">{formattedInvoiceDate}</span>
                            </div>
                            <div class="info-field">
                                <span class="field-label">Due Date</span>
                                <span class="field-value">{formattedDueDate}</span>
                            </div>
                            <div class="info-field">
                                <span class="field-label">Customer</span>
                                <span class="field-value bold">
                                    <template if:true={invoiceRecord.AMERP_Customer__r}>
                                        {invoiceRecord.AMERP_Customer__r.Name}
                                    </template>
                                    <template if:false={invoiceRecord.AMERP_Customer__r}>—</template>
                                </span>
                            </div>
                            <div class="info-field">
                                <span class="field-label">Contact</span>
                                <span class="field-value bold">
                                    <template if:true={invoiceRecord.Contact__r}>
                                        {invoiceRecord.Contact__r.Name}
                                    </template>
                                    <template if:false={invoiceRecord.Contact__r}>—</template>
                                </span>
                            </div>
                            <!-- <div class="info-field">
                                <span class="field-label">Vendor</span>
                                <span class="field-value highlight-orange">
                                    <template if:true={invoiceRecord.AMERP_Vendor__r}>
                                        {invoiceRecord.AMERP_Vendor__r.Name}
                                    </template>
                                    <template if:false={invoiceRecord.AMERP_Vendor__r}>—</template>
                                </span>
                            </div> -->
                        </div>
                    </div>
                </div>

                <!-- Payment Information Section -->
                <div class="info-section slds-m-bottom_medium">
                    <div class="section-header">
                        <span class="section-icon">💳</span>
                        <span class="section-title">Payment Information</span>
                    </div>
                    <div class="info-card">
                        <div class="info-grid">
                            <div class="info-field">
                                <span class="field-label">Invoice Amount</span>
                                <span class="field-value bold">{formattedInvoiceAmount}</span>
                            </div>
                            <!-- <div class="info-field">
                                <span class="field-label">Total Amount</span>
                                <span class="field-value bold">{formattedTotalAmount}</span>
                            </div> -->
                            <div class="info-field">
                                <span class="field-label">Total Paid Amount</span>
                                <span class="field-value highlight-green">{formattedPaidAmount}</span>
                            </div>
                            <div class="info-field">
                                <span class="field-label">Balance Amount</span>
                                <span class="field-value bold">{formattedBalanceAmount}</span>
                            </div>
                            <div class="info-field">
                                <span class="field-label">Outstanding Amount</span>
                                <span class="field-value highlight-orange">{formattedOutstandingAmount}</span>
                            </div>
                            <div class="info-field">
                                <span class="field-label">Status</span>
                                <span class="status-badge">{invoiceRecord.AMERP_Payment_Status__c}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- References Section -->
                <!-- <div class="info-section slds-m-bottom_medium">

                        <span class="section-icon">🔗</span>

                <!-- Payment History Section -->
                <template if:true={paymentHistory}>
                    <div class="info-section slds-m-bottom_medium">
                        <div class="section-header">
                            <span class="section-icon">📋</span>
                            <span class="section-title">Payment History</span>
                        </div>
                        <div class="info-card">
                            <template if:true={paymentHistory.length}>
                                <div class="payment-history-table">
                                    <table>
                                        <thead>
                                            <tr class="table-header-row">
                                                <th>Date</th>
                                                <th>Payment Mode</th>
                                                <th>Transaction ID</th>
                                                <th>Amount</th>
                                                <th>Status</th>
                                                <th>Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={formattedPaymentHistory} for:item="payment">
                                                <tr key={payment.Id} class="table-body-row">
                                                    <td>{payment.formattedDate}</td>
                                                    <td>{payment.AMERP_Payment_Mode__c}</td>
                                                    <td class="transaction-id">{payment.AMERP_Transaction_Id__c}</td>
                                                    <td class="amount-cell">{payment.formattedAmount}</td>
                                                    <td>
                                                        <span class="status-badge">{payment.AMERP_Payment_Status__c}</span>
                                                    </td>
                                                    <td>
                                                        <lightning-button
                                                            label="Download Receipt"
                                                            variant="base"
                                                            size="small"
                                                            onclick={downloadPaymentReceipt}
                                                            data-payment-id={payment.Id}
                                                            class="receipt-button"
                                                        ></lightning-button>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                            <template if:false={paymentHistory.length}>
                                <p class="no-data-message">No payments recorded yet.</p>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Remarks Section -->
                <template if:true={invoiceRecord.AMERP_Remarks__c}>
                    <div class="info-section">
                        <div class="section-header">
                            <span class="section-icon">📝</span>
                            <span class="section-title">Remarks</span>
                        </div>
                        <div class="info-card">
                            <p class="remarks-text">{invoiceRecord.AMERP_Remarks__c}</p>
                        </div>
                    </div>
                </template>

                <!-- Make Payment Button and Search Another Button -->
                <div class="slds-p-around_medium slds-text-align_center slds-m-top_large">
                    <template if:true={autoLoadedFromUrl}>
                        <lightning-button
                            label="Search Another Invoice"
                            variant="neutral"
                            onclick={handleSearchAnother}
                            class="slds-m-right_small"
                        ></lightning-button>
                    </template>
                    <template if:true={hasOutstanding}>
                        <lightning-button
                            label="Make Payment"
                            variant="success"
                            onclick={handleMakePayment}
                            class="pay-button"
                        ></lightning-button>
                    </template>
                </div>

            </div>
        </template>

        <!-- Payment Form Section -->
        <template if:true={showPaymentSection}>
            <div class="payment-section slds-p-around_medium">
                <h2 class="payment-header">💳 Make Payment</h2>
                
                <!-- Payment Error Message -->
                <template if:true={paymentErrorMessage}>
                    <div class="slds-p-around_small slds-m-bottom_medium">
                        <div class="error-alert" role="alert">
                            <p>{paymentErrorMessage}</p>
                        </div>
                    </div>
                </template>

                <!-- Payment Mode Tabs -->
                <div class="payment-mode-tabs slds-m-bottom_medium">
                    <button
                        class={upiTabClass}
                        data-mode="UPI"
                        onclick={handlePaymentModeSelect}
                    >
                        UPI
                    </button>
                    <button
                        class={cashTabClass}
                        data-mode="Cash"
                        onclick={handlePaymentModeSelect}
                    >
                        Cash
                    </button>
                    <button
                        class={bankTabClass}
                        data-mode="Bank Transfer"
                        onclick={handlePaymentModeSelect}
                    >
                        Bank Transfer
                    </button>
                    <button
                        class={cardTabClass}
                        data-mode="Card"
                        onclick={handlePaymentModeSelect}
                    >
                        Card
                    </button>
                </div>

                <!-- Payment Form Card -->
                <div class="payment-form-card">
                    <!-- Common Fields -->
                    <div class="form-row">
                        <div class="form-col">
                            <lightning-input
                                type="number"
                                label="Payment Amount"
                                value={paymentAmount}
                                data-field="paymentAmount"
                                onchange={handlePaymentFieldChange}
                                step="0.01"
                                min="0"
                                required
                            ></lightning-input>
                        </div>
                        <div class="form-col">
                            <lightning-input
                                type="date"
                                label="Payment Date"
                                value={paymentDate}
                                data-field="paymentDate"
                                onchange={handlePaymentFieldChange}
                                required
                            ></lightning-input>
                        </div>
                    </div>

                    <!-- UPI Fields -->
                    <template if:true={isUPIMode}>
                        <div class="form-row">
                            <div class="form-col">
                                <lightning-input
                                    type="text"
                                    label="UPI ID"
                                    placeholder="user@bank"
                                    value={paymentData.upiId}
                                    data-field="upiId"
                                    onchange={handlePaymentFieldChange}
                                    required
                                ></lightning-input>
                            </div>
                            <div class="form-col">
                                <lightning-input
                                    type="text"
                                    label="Name On UPI"
                                    value={paymentData.nameOnUpi}
                                    data-field="nameOnUpi"
                                    onchange={handlePaymentFieldChange}
                                    required
                                ></lightning-input>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-col">
                                <lightning-combobox
                                    label="UPI App Name"
                                    value={paymentData.upiAppName}
                                    options={upiAppOptions}
                                    data-field="upiAppName"
                                    onchange={handlePaymentFieldChange}
                                    required
                                ></lightning-combobox>
                            </div>
                        </div>
                    </template>

                    <!-- Cash Fields -->
                    <template if:true={isCashMode}>
                        <div class="form-row">
                            <div class="form-col">
                                <lightning-input
                                    type="text"
                                    label="Cash Receipt Number"
                                    value={paymentData.cashReceiptNumber}
                                    data-field="cashReceiptNumber"
                                    onchange={handlePaymentFieldChange}
                                    required
                                ></lightning-input>
                            </div>
                            <div class="form-col">
                                <lightning-input
                                    type="text"
                                    label="Cash Received By"
                                    value={paymentData.cashReceivedBy}
                                    data-field="cashReceivedBy"
                                    onchange={handlePaymentFieldChange}
                                    required
                                ></lightning-input>
                            </div>
                        </div>
                    </template>

                    <!-- Bank Transfer Fields -->
                    <template if:true={isBankMode}>
                        <div class="form-row">
                            <div class="form-col">
                                <lightning-input
                                    type="text"
                                    label="Bank Name"
                                    value={paymentData.bankName}
                                    data-field="bankName"
                                    onchange={handlePaymentFieldChange}
                                    required
                                ></lightning-input>
                            </div>
                            <div class="form-col">
                                <lightning-input
                                    type="text"
                                    label="Bank Account Number"
                                    value={paymentData.bankAccountNumber}
                                    data-field="bankAccountNumber"
                                    onchange={handlePaymentFieldChange}
                                    required
                                ></lightning-input>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-col">
                                <lightning-input
                                    type="text"
                                    label="IFSC Code"
                                    placeholder="e.g., SBIN0001234"
                                    value={paymentData.ifscCode}
                                    data-field="ifscCode"
                                    onchange={handlePaymentFieldChange}
                                    required
                                ></lightning-input>
                            </div>
                        </div>
                    </template>

                    <!-- Card Fields -->
                    <template if:true={isCardMode}>
                        <div class="form-row">
                            <div class="form-col">
                                <lightning-combobox
                                    label="Card Type"
                                    value={paymentData.cardType}
                                    options={cardTypeOptions}
                                    data-field="cardType"
                                    onchange={handlePaymentFieldChange}
                                    required
                                ></lightning-combobox>
                            </div>
                            <div class="form-col">
                                <lightning-input
                                    type="text"
                                    label="Card Holder Name"
                                    value={paymentData.cardHolderName}
                                    data-field="cardHolderName"
                                    onchange={handlePaymentFieldChange}
                                    required
                                ></lightning-input>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-col">
                                <lightning-input
                                    type="password"
                                    label="Card Number (Last 4 digits)"
                                    placeholder="e.g., 1234"
                                    value={paymentData.cardNumber}
                                    data-field="cardNumber"
                                    onchange={handlePaymentFieldChange}
                                    maxlength="4"
                                    required
                                ></lightning-input>
                            </div>
                        </div>
                    </template>

                    <!-- Form Buttons -->
                    <div class="form-buttons slds-m-top_large">
                        <template if:true={isPaymentLoading}>
                            <lightning-spinner alternative-text="Processing payment..." size="small"></lightning-spinner>
                        </template>
                        <template if:false={isPaymentLoading}>
                            <lightning-button
                                label="Pay Now"
                                variant="success"
                                onclick={handlePayNow}
                                class="slds-m-right_small"
                            ></lightning-button>
                            <lightning-button
                                label="Cancel"
                                variant="neutral"
                                onclick={handleCancelPayment}
                            ></lightning-button>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Success Screen -->
        <template if:true={showSuccessScreen}>
            <div class="success-screen slds-p-around_large">
                <div class="success-container">
                    <div class="success-icon">✅</div>
                    <h2 class="success-title">Payment Successful!</h2>
                    
                    <div class="success-card">
                        <div class="success-summary">
                            <div class="success-row">
                                <span class="success-label">Amount:</span>
                                <span class="success-value">{formattedPaymentAmount}</span>
                            </div>
                            <div class="success-row">
                                <span class="success-label">Payment Mode:</span>
                                <span class="success-value">{selectedPaymentMode}</span>
                            </div>
                            <div class="success-row">
                                <span class="success-label">Date:</span>
                                <span class="success-value">{formattedPaymentDate}</span>
                            </div>
                            <div class="success-row">
                                <span class="success-label">Transaction ID:</span>
                                <span class="success-value transaction-id">{generatedTransactionId}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Updated Invoice Information -->
                    <template if:true={invoiceRecord}>
                        <div class="success-updated-info">
                            <h3 class="success-subheader">Updated Invoice Information</h3>
                            <div class="updated-info-row">
                                <span class="success-label">Total Paid Amount:</span>
                                <span class="success-value">{formattedPaidAmount}</span>
                            </div>
                            <div class="updated-info-row">
                                <span class="success-label">Outstanding Amount:</span>
                                <span class="success-value">{formattedOutstandingAmount}</span>
                            </div>
                            <div class="updated-info-row">
                                <span class="success-label">Balance Amount:</span>
                                <span class="success-value">{formattedBalanceAmount}</span>
                            </div>
                        </div>
                    </template>

                    <lightning-button
                        label="Search Another Invoice"
                        variant="brand"
                        onclick={handleSearchAnother}
                        class="success-button"
                    ></lightning-button>
                </div>
            </div>
        </template>

    </lightning-card>
</template>
